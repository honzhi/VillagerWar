# 背包预设配置
# 玩家在不同状态下自动切换背包物品

presets:

  # ┌─────────────────────────────────────────────┐
  # │ 匹配中：备战席等待时的物品                    │
  # └─────────────────────────────────────────────┘
  matching:
    - material: BOOK
      slot: 8
      amount: 1
      display_name: "&c退出匹配"
      function: "leave_match"       # 功能键名：退出匹配
      lore:
        - "&7右键点击退出匹配队列"

  # ┌─────────────────────────────────────────────┐
  # │ 技能选择：选择技能时的物品                    │
  # └─────────────────────────────────────────────┘
  skill_select:
    - material: BOOK
      slot: 0
      amount: 1
      display_name: "&a选择技能"
      function: "select_skill"      # 功能键名：选择技能
      lore:
        - "&7点击打开技能选择界面"

  # ┌─────────────────────────────────────────────┐
  # │ 技能选择后：已选好技能等待传送的物品           │
  # └─────────────────────────────────────────────┘
  after_skill_select:
    - material: BOOK
      slot: 0
      amount: 1
      display_name: "&a技能已选择"
      function: "show_skill"        # 功能键名：查看技能
      lore:
        - "&7等待游戏开始..."