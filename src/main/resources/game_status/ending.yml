ending:
  duration: 5                     # 结束展示时长（秒）
  respawn_dead: true              # 是否立即复活死亡玩家，方便查看结算
  remove_potions: true           # 清除所有药水效果
  
  # ─── 计分板 ───
  scoreboard:
    enabled: true
    title: "&6&l游戏结束"
    lines:
      - "&7━━━━━━━━━━━━━━"
      - " &f胜者: &a{winner}"
      - " &f比分: &a{team_a_kills}&7 vs &c{team_b_kills}"
      - ""
      - " &7━━ 个人战绩 ━━"
      - " &f击杀: &c{kills}  &f死亡: &7{deaths}  &f助攻: &a{assists}"
      - "&7━━━━━━━━━━━━━━"

  # ─── 展示效果 ───
  display:
    win:
      title: "&a&l胜利！"
      subtitle: "&7恭喜队伍 &a{team} &7获得胜利"
      sound: "ENTITY_ENDER_DRAGON_GROAN 1 1"
    lose:
      title: "&c&l失败"
      subtitle: "&7下次加油！"
      sound: "ENTITY_WITHER_SPAWN 1 1"
    draw:
      title: "&e&l平局"
      subtitle: "&7势均力敌"
      sound: "ENTITY_EXPERIENCE_ORB_PICKUP 1 1"

