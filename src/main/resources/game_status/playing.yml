playing:
  # ─── Ready 倒计时（进入游戏地图后的倒数） ───
  # 传送完成后显示，倒计时结束进入战斗
  ready:
    title: "&e{remain}"
    subtitle: "&7游戏即将开始"
    sound: "BLOCK_NOTE_BLOCK_PLING 1 1"
    final_sound: "ENTITY_EXPERIENCE_ORB_PICKUP 1 1"

  # ─── 计分板 ───
  scoreboard:
    enabled: true
    title: "&6&l村民战争"
    lines:
      - "&7━━━━━━━━━━━━━━"
      - " &f队伍: &a{team}"
      - " &f金币: &e{gold}"
      - " &f击杀: &c{kills}  &f死亡: &7{deaths}"
      - ""
      - " &f时间: &b{time}"
      - " &f比分: &a{team_a_kills}&7 vs &c{team_b_kills}"
      - "&7━━━━━━━━━━━━━━"

  # ─── 顶部状态栏（ActionBar） ───
  actionbar:
    enabled: true
    template: "&e{gold} &7金币  |  &c❤ {health}  |  &b⏱ {time}"

  # ─── 玩家行为限制 ───
  player:
    friendly_fire: false
    natural_regen: true
    hunger_deplete: false
    fall_damage: true
    keep_inventory: true
    keep_level: true

  # ─── 击杀特效 ───
  kill_effects:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP 1 1"
    particles: true

  # ─── 连杀播报 ───
  kill_streak:
    announce: true
    threshold:
      3: "&e{player} &7正在大杀特杀！（3连杀）"
      5: "&6{player} &7无人能挡！（5连杀）"
      10: "&4{player} &7已经超越神了！（10连杀）"