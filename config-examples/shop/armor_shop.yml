# 商店标题
title: "&6防具商店"
layout:
  - "000000000"
  - "0A0000000"
  - "000000000"
  - "000000000"
  - "000000000"
  - "0000X0000"

base:
  A:
    material: iron_helmet
    display_name: 铁头盔
    lore: 
    - "&7点击购买"
    value: 100
    conditions:
      has_money: 0
      game_time: 0 #秒
      level: 0
    buy: 
      success:
        -  "command: ic give %player% iron_helmet"
        -  "title: 购买成功 20 60 20"
        -  "message: 你获得了l个铁头盔"
        -  "sound: ENTITY_PLAYER_LEVELUP"
      failure:
        -  "title: 金币不足 20 60 20"  #20 60 20 分别为淡入时间 持续时间 淡出时间
  X:
    material: barrier
    display_name: 关闭
    Value: 0
    conditions:
      has_money: 0
      game_time: 0 #秒
      level: 0
    buy: 
      success:
        -  "close"  #关闭gui
      failure:
        -  "close"  #关闭gui
