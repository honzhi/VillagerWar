# ──────────────────────────────────────────────────────────────────────────────
# 地图配置模版（单张地图）
# 当 maps/<id>/map.yml 不存在时，插件自动复制此文件内容创建
# ──────────────────────────────────────────────────────────────────────────────

# ─── 队伍配置 ───
# id:      队伍标识符
# spawn:   玩家出生点
# base:    基地位置（用于胜利判定等）
# soldier: 士兵生成点，支持两种写法：
#   写法1（两点区域随机生成）：
#     soldier:
#       point1: { x, y, z }
#       point2: { x, y, z }
#   写法2（单点生成）：
#     soldier:
#       x: 0.0  y: 64.0  z: 0.0

# 地图显示名称
display_name: "新地图"


teams:
  - id: red
    player:  #玩家出生/复活位置
      spawn:
        points:
          - {x: 1, y: 64, z: 1}
          - {x: 2, y: 64, z: 2}
        yaw: 0
        pitch: 0
    base:  #基地位置
      entity:
        type: mythicmobs
        id: 红方国王
      spawn:
        point: { x, y, z }
        yaw: 0
        pitch: 0
    soldier:
      entity:
        type: mythicmobs
      loop:
       - 红方僵尸
       - 红方僵尸
       - 红方骷髅
      loop_interval: 60  #循环间隔单位tick
      delay: 60 #进入下一次循环的延迟时间
      spawn:
        points:
          - {x: 1, y: 64, z: 1}
          - {x: 2, y: 64, z: 2}
        yaw: 0
        pitch: 0
  - id: blue
    player:  #玩家出生/复活位置
      spawn:
        point1: { x, y, z }
        point2: { x, y, z }
        yaw: 0
        pitch: 0
    base:  #基地位置
      entity:
        type: mythicmobs
        id: 蓝方国王
      spawn:
        point: { x, y, z }
        yaw: 0
        pitch: 0
    soldier:
      entity:
        type: mythicmobs
      loop:
       - 蓝方僵尸
       - 蓝方僵尸
       - 蓝方骷髅
      loop_interval: 60  #循环间隔单位tick
      delay: 60 #进入下一次循环的延迟时间
      spawn:
        point1: { x, y, z }
        point2: { x, y, z }
        yaw: 0
        pitch: 0

shops: defaults # 右键基地打开的商店模版

# ─── 游戏区域边界（用于胜利判定、实体清理） ───
bounds:
  min_x: -50
  max_x: 50
  min_z: -50
  max_z: 50
